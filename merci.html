<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Merci ! Ton kit est en route | La Trousse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="https://images.pandagro-svt.fr/Images%20agendas%20la%20trousse/logo%20flavicon%20la%20trousse%20en%20flavicon%20la%20trousse%20en%20blanc%20sur%20fond%20bleu%20sans%20fond.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito Sans',system-ui,Arial,sans-serif;
  background:#eff2f9;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
  --navy:#1e2d5a;--navy2:#2a3d6f;--navy-ink:#16213f;--accent:#3d5fc4;--muted:#5f6c8a;
}
.card{
  background:#fff;border-radius:24px;
  box-shadow:0 20px 60px rgba(30,45,90,.13);
  padding:52px 44px;width:100%;max-width:460px;text-align:center;
}
.logo{height:40px;width:auto;margin:0 auto 36px;display:block;}
.icon{font-size:52px;margin-bottom:20px;}
h1{font-family:'Baloo 2',cursive;font-weight:800;color:var(--navy-ink);font-size:1.9rem;line-height:1.15;margin-bottom:12px;}
p{font-size:.95rem;color:var(--muted);line-height:1.7;margin-bottom:28px;}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--navy);color:#fff;border-radius:12px;
  padding:14px 28px;font-weight:700;font-size:.95rem;
  text-decoration:none;transition:background .18s,transform .18s;
}
.btn:hover{background:var(--navy2);transform:translateY(-2px);}
.spam{margin-top:20px;font-size:12px;color:#b0bace;}
@media(max-width:480px){.card{padding:36px 22px;}}
</style>
</head>
<body>
<div class="card">
  <img src="https://images.pandagro-svt.fr/Images%20agendas%20la%20trousse/logo%20sans%20fond%20la%20trousse.png" alt="La Trousse" class="logo">
  <div class="icon">🎉</div>
  <h1>Ton kit est en route !</h1>
  <p>Vérifie ta boîte mail dans les prochaines minutes.<br>Pense à regarder dans les spams si tu ne vois rien.</p>
  <a class="btn" href="https://www.la-trousse.fr">Découvrir les agendas →</a>
  <p class="spam">Tu peux te désinscrire à tout moment en un clic.</p>
</div>
</body>
</html>
