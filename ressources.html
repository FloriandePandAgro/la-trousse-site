<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kit gratuit de gestion de classe | La Trousse</title>
<meta name="description" content="Télécharge gratuitement le kit de gestion de classe La Trousse : planning, suivi d'élèves et ressources pratiques pour les profs.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="https://images.pandagro-svt.fr/Images%20agendas%20la%20trousse/logo%20flavicon%20la%20trousse%20en%20flavicon%20la%20trousse%20en%20blanc%20sur%20fond%20bleu%20sans%20fond.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito Sans',system-ui,Arial,sans-serif;
  background:#eff2f9;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  --navy:#1e2d5a;--navy2:#2a3d6f;--navy-ink:#16213f;
  --accent:#3d5fc4;--line:#e3e8f2;--muted:#5f6c8a;
}

.card{
  background:#fff;
  border-radius:24px;
  box-shadow:0 20px 60px rgba(30,45,90,.13);
  padding:48px 44px;
  width:100%;
  max-width:480px;
  text-align:center;
}

.logo{height:40px;width:auto;margin:0 auto 32px;display:block;}

.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--accent);font-size:11.5px;font-weight:800;
  letter-spacing:.13em;text-transform:uppercase;margin-bottom:16px;
}
.eyebrow::before,.eyebrow::after{content:'';width:18px;height:2px;background:var(--accent);border-radius:2px;}

h1{
  font-family:'Baloo 2',cursive;font-weight:800;
  color:var(--navy-ink);font-size:clamp(1.5rem,3.5vw,2rem);
  line-height:1.15;margin-bottom:10px;
}
h1 em{font-style:normal;color:var(--accent);}

.sub{font-size:.93rem;color:var(--muted);line-height:1.6;margin-bottom:28px;}

.form{display:flex;flex-direction:column;gap:12px;}

input{
  width:100%;padding:14px 16px;
  border:2px solid var(--line);border-radius:12px;
  font-family:'Nunito Sans',sans-serif;font-size:.97rem;font-weight:600;
  color:var(--navy-ink);outline:none;
  transition:border-color .18s;
}
input::placeholder{color:#b0bace;font-weight:400;}
input:focus{border-color:var(--accent);}

button{
  width:100%;padding:16px;
  background:var(--navy);color:#fff;border:0;border-radius:12px;
  font-family:'Nunito Sans',sans-serif;font-size:1rem;font-weight:800;
  cursor:pointer;box-shadow:0 6px 20px rgba(30,45,90,.2);
  transition:transform .18s,box-shadow .18s,background .18s;
}
button:hover{background:var(--navy2);transform:translateY(-2px);box-shadow:0 12px 28px rgba(30,45,90,.28);}
button:disabled{opacity:.6;cursor:default;transform:none;}

.legal{font-size:11.5px;color:#b0bace;margin-top:4px;}

.error{display:none;color:#c0392b;font-size:.88rem;font-weight:600;margin-top:2px;}
.error.show{display:block;}

.success{display:none;flex-direction:column;align-items:center;gap:12px;}
.success.show{display:flex;}
.success-icon{font-size:48px;}
.success h2{font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:700;color:var(--navy-ink);}
.success p{font-size:.93rem;color:var(--muted);line-height:1.6;}

@media(max-width:520px){
  .card{padding:36px 24px;}
}
</style>
</head>
<body>

<div class="card">
  <img src="https://images.pandagro-svt.fr/Images%20agendas%20la%20trousse/logo%20sans%20fond%20la%20trousse.png" alt="La Trousse" class="logo">

  <div id="form-block">
    <div class="eyebrow">Ressource gratuite</div>
    <h1>Le kit pour <em>mieux gérer ta classe</em></h1>
    <p class="sub">Planning, suivi des élèves et fiches pratiques — reçois tout gratuitement par email.</p>

    <form class="form" id="subscribe-form" novalidate>
      <input type="text" id="firstName" placeholder="Ton prénom" autocomplete="given-name">
      <input type="email" id="email" placeholder="Ton adresse email" autocomplete="email" required>
      <button type="submit" id="submit-btn">Recevoir le kit gratuitement →</button>
      <div class="error" id="form-error"></div>
      <p class="legal">Pas de spam. Désinscription en un clic.</p>
    </form>
  </div>

  <div class="success" id="form-success">
    <div class="success-icon">🎉</div>
    <h2>C'est dans ta boîte !</h2>
    <p>Vérifie tes spams si tu ne reçois rien dans les 5 minutes.</p>
  </div>
</div>

<script>
(function(){
  var form = document.getElementById('subscribe-form');
  var btn  = document.getElementById('submit-btn');
  var err  = document.getElementById('form-error');
  var ok   = document.getElementById('form-success');
  var block= document.getElementById('form-block');

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    err.classList.remove('show');

    var email     = document.getElementById('email').value.trim();
    var firstName = document.getElementById('firstName').value.trim();

    if(!email){
      err.textContent = 'Merci de renseigner ton email.';
      err.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Envoi…';

    try {
      var res = await fetch('/.netlify/functions/subscribe', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:email, firstName:firstName}),
      });
      if(res.ok){
        block.style.display = 'none';
        ok.classList.add('show');
      } else { throw new Error(); }
    } catch(_){
      err.textContent = 'Une erreur s\'est produite. Réessaie dans quelques instants.';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Recevoir le kit gratuitement →';
    }
  });
})();
</script>
</body>
</html>
